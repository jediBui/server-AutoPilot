---
- name: Provision Ubuntu VM
  hosts: localhost
  connection: local
  become: true
  vars:
    github_username: jediBui
    rdp_port: 3389
    starship_theme: catppuccin-frappe
    font_size: 13
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    user_home: "{{ '/home/' + target_user if target_user != 'root' else '/root' }}"


  pre_tasks:
    - name: Verify running as root
      assert:
        that: ansible_facts["user_id"] == "root"
        fail_msg: "This playbook must be run as root (via sudo)"

    - name: Purge conflicting Chrome repo/keyring files before apt runs
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/google-chrome-stable.list
        - /etc/apt/sources.list.d/google-chrome.list
        - /usr/share/keyrings/google-chrome.asc
        - /usr/share/keyrings/google-chrome.gpg

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

  tasks:
    # ── SSH Keys ──────────────────────────────────────────────────────────────
    - name: Fetch SSH keys from GitHub
      uri:
        url: "https://github.com/{{ github_username }}.keys"
        return_content: yes
        status_code: 200
      register: github_keys
      retries: 3
      delay: 5

    - name: Ensure .ssh directory exists for target user
      file:
        path: "{{ user_home }}/.ssh"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0700"

    - name: Write GitHub SSH keys to authorized_keys
      copy:
        content: "{{ github_keys.content }}"
        dest: "{{ user_home }}/.ssh/authorized_keys"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0600"

    # ── Core Applications ─────────────────────────────────────────────────────
    - name: Install core packages
      apt:
        name:
          - curl
          - git
          - openssh-server
          - fzf
          - ufw
          - qemu-guest-agent
          - wget
          - unzip
          - fontconfig
          - dconf-cli
          - gnome-tweaks
          - openssl
        state: present
        update_cache: no

    - name: Disable SSH password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        state: present
        backup: yes
      notify: Restart SSH

    - name: Disable SSH challenge-response authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ChallengeResponseAuthentication"
        line: "ChallengeResponseAuthentication no"
        state: present
      notify: Restart SSH

    - name: Ensure PubkeyAuthentication is enabled
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PubkeyAuthentication"
        line: "PubkeyAuthentication yes"
        state: present
      notify: Restart SSH

    - name: Write Google Chrome install script
      copy:
        dest: /tmp/install-chrome.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          chmod 644 /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
          apt-get update -qq
          apt-get install -y --download-only google-chrome-stable
          rm -f /etc/apt/sources.list.d/google-chrome-stable.list /usr/share/keyrings/google-chrome.asc
          apt-get install -y google-chrome-stable
          rm -f /etc/apt/sources.list.d/google-chrome-stable.list /usr/share/keyrings/google-chrome.asc

    - name: Install Google Chrome
      command: /tmp/install-chrome.sh
      args:
        creates: /usr/bin/google-chrome-stable

    # ── UFW Firewall ──────────────────────────────────────────────────────────
    - name: Configure and enable UFW
      shell: |
        ufw --force reset
        ufw default deny incoming
        ufw default allow outgoing
        ufw allow 22/tcp comment 'SSH'
        ufw allow {{ rdp_port }}/tcp comment 'RDP'
        ufw --force enable
      changed_when: true

    # ── QEMU Guest Agent ──────────────────────────────────────────────────────
    - name: Enable and start qemu-guest-agent
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started

    # ── RDP via XRDP ─────────────────────────────────────────────────────────
    # xrdp is a system service — works headlessly, no active session needed.
    # Connect with: host:3389, your normal Ubuntu username and password.

    - name: Install xrdp
      apt:
        name:
          - xrdp
          - xorgxrdp
        state: present

    - name: Set xrdp to listen on port {{ rdp_port }}
      lineinfile:
        path: /etc/xrdp/xrdp.ini
        regexp: "^port="
        line: "port={{ rdp_port }}"
        backup: yes
      notify: Restart xrdp

    - name: Add xrdp user to ssl-cert group (fixes TLS errors)
      user:
        name: xrdp
        groups: ssl-cert
        append: yes

    - name: Use the existing desktop session instead of a new Xorg session
      copy:
        dest: "{{ user_home }}/.xsession"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
        content: |
          export GNOME_SHELL_SESSION_MODE=ubuntu
          export XDG_SESSION_TYPE=x11
          export XDG_CURRENT_DESKTOP=ubuntu:GNOME
          exec /usr/bin/gnome-session

    - name: Enable and start xrdp
      systemd:
        name: xrdp
        enabled: yes
        state: started

    # ── SF Mono Nerd Font ─────────────────────────────────────────────────────
    - name: Create fonts directory
      file:
        path: /usr/local/share/fonts/SFMonoNerd
        state: directory
        mode: "0755"

    - name: Clone SF-Mono-Nerd-Font repository
      git:
        repo: https://github.com/epk/SF-Mono-Nerd-Font.git
        dest: /tmp/SF-Mono-Nerd-Font
        depth: 1

    - name: Copy Regular font files only
      shell: |
        find /tmp/SF-Mono-Nerd-Font -iname "*Regular*" -type f -name "*.ttf" -exec cp {} /usr/local/share/fonts/SFMonoNerd/ \;
        find /tmp/SF-Mono-Nerd-Font -iname "*Regular*" -type f -name "*.otf" -exec cp {} /usr/local/share/fonts/SFMonoNerd/ \;
      args:
        creates: /usr/local/share/fonts/SFMonoNerd/.installed

    - name: Mark fonts as installed
      file:
        path: /usr/local/share/fonts/SFMonoNerd/.installed
        state: touch

    - name: Rebuild font cache
      command: fc-cache -fv
      changed_when: false

    # ── Starship Prompt ───────────────────────────────────────────────────────
    - name: Check if Starship is already installed
      stat:
        path: /usr/local/bin/starship
      register: starship_binary

    - name: Download and install Starship
      shell: |
        curl -fsSL https://starship.rs/install.sh | sh -s -- --yes
      when: not starship_binary.stat.exists
      args:
        creates: /usr/local/bin/starship

    - name: Ensure starship config directory exists
      file:
        path: "{{ user_home }}/.config"
        state: directory
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"

    - name: Download Catppuccin Frappe starship theme
      get_url:
        url: "https://raw.githubusercontent.com/catppuccin/starship/main/themes/frappe.toml"
        dest: "{{ user_home }}/.config/starship.toml"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
        force: no

    - name: Initialise Starship in .bashrc
      blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} STARSHIP PROMPT"
        block: |
          # Starship prompt
          export STARSHIP_CONFIG="$HOME/.config/starship.toml"
          eval "$(starship init bash)"
        create: yes
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Initialise Starship in .bash_profile (login shells)
      blockinfile:
        path: "{{ user_home }}/.bash_profile"
        marker: "# {mark} STARSHIP PROMPT"
        block: |
          [[ -f ~/.bashrc ]] && source ~/.bashrc
        create: yes
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    # ── GNOME Terminal font configuration (best-effort, needs active session) ─
    - name: Check which terminal emulator is installed
      shell: "command -v gnome-terminal || command -v kgx || command -v xterm || echo none"
      register: terminal_bin
      changed_when: false

    - name: Write terminal font dconf script (run after login)
      copy:
        dest: "{{ user_home }}/.config/set-terminal-font.sh"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0755"
        content: |
          #!/bin/bash
          # Run this once after your first graphical login to apply the terminal font.
          set -e
          if command -v gnome-terminal &>/dev/null; then
            PROFILE=$(gsettings get org.gnome.Terminal.ProfilesList default | tr -d "'")
            dconf write /org/gnome/terminal/legacy/profiles:/:${PROFILE}/font "'SFMono Nerd Font Regular 13'"
            dconf write /org/gnome/terminal/legacy/profiles:/:${PROFILE}/use-system-font "false"
            echo "gnome-terminal font set."
          elif command -v kgx &>/dev/null; then
            gsettings set org.gnome.Console custom-font "'SFMono Nerd Font Regular 13'"
            gsettings set org.gnome.Console use-system-font false
            echo "GNOME Console font set."
          else
            echo "No supported terminal found. Set font manually in your terminal preferences."
          fi

    - name: Note about terminal font
      debug:
        msg: >-
          Terminal detected: {{ terminal_bin.stdout }}.
          To apply the terminal font after login run: bash ~/.config/set-terminal-font.sh

  # ── Handlers ────────────────────────────────────────────────────────────────
  handlers:
    - name: Restart SSH
      systemd:
        name: sshd
        state: restarted

    - name: Restart xrdp
      systemd:
        name: xrdp
        state: restarted

    - name: Update apt cache
      apt:
        update_cache: yes
