---
- name: TARS System Provisioning
  hosts: localhost
  connection: local
  vars:
    gh_user: "jediBui"
    target_user: "{{ lookup('env', 'USER') }}"
    target_home: "{{ lookup('env', 'HOME') }}"
    font_dir: "{{ lookup('env', 'HOME') }}/.local/share/fonts"
    themes:
      - { name: "onedark", dir: "#61afef", char: "#98c379", git: "#c678dd" }
      - { name: "frappe",  dir: "#8caaee", char: "#a6d189", git: "#ca9ee6" }
      - { name: "mocha",   dir: "#89b4fa", char: "#a6e3a1", git: "#cba6f7" }

  tasks:
    - name: TARS | Checking for GNOME presence
      command: which gnome-shell
      register: gnome_check
      ignore_errors: true
      changed_when: false

    - name: TARS | Check GNOME Terminal schema exists
      command: gsettings list-schemas
      register: gnome_schemas
      ignore_errors: true
      changed_when: false
      when: gnome_check.rc == 0

    - name: TARS | Detect GNOME Terminal Profile
      become_user: "{{ target_user }}"
      command: gsettings get org.gnome.Terminal.ProfilesList default
      register: gnome_profile_raw
      ignore_errors: true
      changed_when: false
      when:
        - gnome_check.rc == 0
        - gnome_schemas.rc == 0
        - "'org.gnome.Terminal.ProfilesList' in gnome_schemas.stdout"

    - name: TARS | Set GNOME Terminal Profile Fact
      set_fact:
        terminal_profile: "{{ gnome_profile_raw.stdout | replace(\"'\", \"\") }}"
      when:
        - gnome_profile_raw is not skipped
        - gnome_profile_raw.rc == 0

    # FIX: Replaced deprecated apt_key / apt_repository with get_url + deb822_repository
    - name: TARS | Adding Repositories and Keys
      become: true
      block:
        - name: Download Chrome signing key
          get_url:
            url: https://dl.google.com/linux/linux_signing_key.pub
            dest: /usr/share/keyrings/google-chrome.asc
            mode: '0644'

        - name: Add Chrome apt repository
          ansible.builtin.deb822_repository:
            name: google-chrome
            uris: http://dl.google.com/linux/chrome/deb/
            suites: stable
            components: main
            architectures: amd64
            signed_by: /usr/share/keyrings/google-chrome.asc

    - name: TARS | Installing Base Packages
      become: true
      apt:
        name:
          - curl
          - git
          - openssh-server
          - bash-completion
          - fzf
          - ufw
          - qemu-guest-agent
          - gnome-remote-desktop
          - fontconfig
          - google-chrome-stable
        state: present
        update_cache: true

    - name: TARS | Installing Starship
      become: true
      shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
      args:
        creates: /usr/local/bin/starship

    - name: TARS | Font Setup
      block:
        - name: Create font directory
          become: true
          file:
            path: "{{ font_dir }}"
            state: directory
            owner: "{{ target_user }}"
            mode: '0755'

        - name: Download SF Mono Powerline fonts
          get_url:
            url: "https://github.com/epk/SF-Mono-Nerd-Font-{{ item }}.otf"
            dest: "{{ font_dir }}/SF-Mono-Powerline-{{ item }}.otf"
            owner: "{{ target_user }}"
          loop: ["Regular", "Bold"]
          register: font_dl

        # FIX: Use selectattr to correctly check changed state across loop results
        - name: Rebuild font cache
          become_user: "{{ target_user }}"
          command: fc-cache -f "{{ font_dir }}"
          when: font_dl.results | selectattr('changed') | list | length > 0

    - name: TARS | Configure GNOME Terminal Font
      become_user: "{{ target_user }}"
      dconf:
        key: "/org/gnome/terminal/legacy/profiles:/:{{ terminal_profile }}/font"
        value: "'SF Mono Powerline 12'"
      when:
        - gnome_check.rc == 0
        - terminal_profile is defined

    - name: TARS | Network and Security
      become: true
      block:
        - name: Allow firewall ports
          ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
          loop: ['22', '3389']

        - name: Enable services
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: ['ufw', 'qemu-guest-agent']

        - name: Add GitHub SSH authorized key
          authorized_key:
            user: "{{ target_user }}"
            key: "https://github.com/{{ gh_user }}.keys"

    - name: TARS | Hardening SSH
      become: true
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardened.conf
        content: |
          PasswordAuthentication no
          PubkeyAuthentication yes
          PermitRootLogin prohibit-password
      notify: restart ssh

    # FIX: Detect SSH service name for cross-distro compatibility
    - name: TARS | Detect SSH service name
      set_fact:
        ssh_svc: "{{ 'sshd' if ansible_os_family == 'RedHat' else 'ssh' }}"

    # FIX: Create starship_themes directory BEFORE writing theme files into it
    - name: TARS | Create Starship Config Directory
      become_user: "{{ target_user }}"
      file:
        path: "{{ target_home }}/.config/starship_themes"
        state: directory
        mode: '0755'

    - name: TARS | Starship Themes Generation
      become_user: "{{ target_user }}"
      copy:
        dest: "{{ target_home }}/.config/starship_themes/{{ item.name }}.toml"
        content: |
          format = "$directory$git_branch$git_status$character"
          add_newline = false
          [directory]
          style = "bold {{ item.dir }}"
          format = "[$path]($style) "
          [character]
          success_symbol = "[❯](bold {{ item.char }})"
          error_symbol = "[❯](bold #e06c75)"
          [git_branch]
          symbol = " "
          style = "bold {{ item.git }}"
          format = "on [$symbol$branch]($style) "
          [git_status]
          style = "bold #e06c75"
          format = "([$all_status$ahead_behind]($style) )"
      loop: "{{ themes }}"

    - name: TARS | Bashrc Drop-in Directory
      become_user: "{{ target_user }}"
      file:
        path: "{{ target_home }}/.bashrc.d"
        state: directory
        mode: '0755'

    # FIX: Write to a drop-in file instead of overwriting .bashrc entirely
    - name: TARS | Write TARS Bashrc Drop-in
      become_user: "{{ target_user }}"
      copy:
        dest: "{{ target_home }}/.bashrc.d/tars.sh"
        content: |
          [ -z "$PS1" ] && return
          HISTCONTROL=ignoreboth
          shopt -s histappend
          HISTSIZE=10000
          eval "$(starship init bash)"
          alias ll='ls -alF --color=auto'
          alias ..='cd ..'
          alias theme-dark='ln -sf ~/.config/starship_themes/onedark.toml ~/.config/starship.toml'

    # FIX: Only touch .bashrc to add the drop-in source line, not replace the whole file
    - name: TARS | Ensure .bashrc sources drop-ins
      become_user: "{{ target_user }}"
      lineinfile:
        path: "{{ target_home }}/.bashrc"
        line: 'for f in ~/.bashrc.d/*.sh; do [ -r "$f" ] && source "$f"; done'
        create: yes

    - name: TARS | Set Default Starship Theme
      become_user: "{{ target_user }}"
      file:
        src: "{{ target_home }}/.config/starship_themes/onedark.toml"
        dest: "{{ target_home }}/.config/starship.toml"
        state: link
        force: yes

  handlers:
    # FIX: Use dynamic ssh_svc name + listen label for reliable notification
    - name: Restart SSH
      listen: "restart ssh"
      service:
        name: "{{ ssh_svc }}"
        state: restarted
