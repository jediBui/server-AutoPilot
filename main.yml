---
- name: TARS System Provisioning
  hosts: localhost
  connection: local
  become: true
  vars:
    gh_user: "jediBui"
    target_user: "{{ lookup('env', 'USER') }}"
    target_home: "{{ lookup('env', 'HOME') }}"
    font_dir: "{{ lookup('env', 'HOME') }}/.local/share/fonts"
    themes:
      - { name: "onedark", dir: "#61afef", char: "#98c379", git: "#c678dd" }
      - { name: "frappe",  dir: "#8caaee", char: "#a6d189", git: "#ca9ee6" }
      - { name: "mocha",   dir: "#89b4fa", char: "#a6e3a1", git: "#cba6f7" }

  tasks:
    - name: TARS | Checking for GNOME presence
      command: command -v gnome-shell
      register: gnome_check
      ignore_errors: true
      changed_when: false

    - name: TARS | Adding Google Chrome signing key
      apt_key:
        url: https://dl.google.com/linux/linux_signing_key.pub
        state: present
        keyring: /usr/share/keyrings/google-chrome.gpg

    - name: TARS | Adding Google Chrome repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main"
        state: present
        filename: google-chrome

    - name: TARS | Installing required packages
      apt:
        name:
          - curl
          - git
          - openssh-server
          - bash-completion
          - fzf
          - ufw
          - qemu-guest-agent
          - gnome-remote-desktop
          - fontconfig
          - google-chrome-stable
        state: present
        update_cache: true

    - name: TARS | Installing Starship binary
      shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
      args:
        creates: /usr/local/bin/starship

    - name: TARS | Creating font directory
      file:
        path: "{{ font_dir }}"
        state: directory
        owner: "{{ target_user }}"
        mode: '0755'

    - name: TARS | Downloading SF Mono Powerline fonts
      get_url:
        url: "https://github.com/Twixes/SF-Mono-Powerline/raw/master/SF-Mono-Powerline-{{ item }}.otf"
        dest: "{{ font_dir }}/SF-Mono-Powerline-{{ item }}.otf"
        owner: "{{ target_user }}"
      loop: ["Regular", "Bold"]
      register: font_download

    - name: TARS | Updating font cache
      become: true
      become_user: "{{ target_user }}"
      command: fc-cache -f "{{ font_dir }}"
      when: font_download.changed

    - name: TARS | Configuring GNOME Terminal font
      become: true
      become_user: "{{ target_user }}"
      dconf:
        key: "/org/gnome/terminal/legacy/profiles:/:{{ item }}/font"
        value: "'SF Mono Powerline 12'"
      loop: "{{ [lookup('pipe', 'gsettings get org.gnome.Terminal.ProfilesList default' ) | replace(\"'\", \"\")] }}"
      when: gnome_check.rc == 0

    - name: TARS | Setting up Firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ['22', '3389']

    - name: TARS | Enabling Firewall and QEMU Agent
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop: ['ufw', 'qemu-guest-agent']

    - name: TARS | Importing GitHub SSH keys
      authorized_key:
        user: "{{ target_user }}"
        state: present
        key: "https://github.com/{{ gh_user }}.keys"

    - name: TARS | Hardening SSH Configuration
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardened.conf
        content: |
          PasswordAuthentication no
          PubkeyAuthentication yes
          PermitRootLogin prohibit-password
      notify: Restart SSH

    - name: TARS | Creating Starship theme directory
      become: true
      become_user: "{{ target_user }}"
      file:
        path: "{{ target_home }}/.config/starship_themes"
        state: directory
        mode: '0755'

    - name: TARS | Writing Starship Theme Files
      become: true
      become_user: "{{ target_user }}"
      copy:
        dest: "{{ target_home }}/.config/starship_themes/{{ item.name }}.toml"
        content: |
          format = "$directory$git_branch$git_status$character"
          add_newline = false
          [directory]
          style = "bold {{ item.dir }}"
          format = "[$path]($style) "
          [character]
          success_symbol = "[❯](bold {{ item.char }})"
          error_symbol = "[❯](bold #e06c75)"
          [git_branch]
          symbol = " "
          style = "bold {{ item.git }}"
          format = "on [$symbol$branch]($style) "
          [git_status]
          style = "bold #e06c75"
          format = "([$all_status$ahead_behind]($style) )"
      loop: "{{ themes }}"

    - name: TARS | Writing .bashrc
      become: true
      become_user: "{{ target_user }}"
      copy:
        dest: "{{ target_home }}/.bashrc"
        content: |
          [ -z "$PS1" ] && return
          HISTCONTROL=ignoreboth
          shopt -s histappend
          HISTSIZE=10000
          eval "$(starship init bash)"
          alias ll='ls -alF --color=auto'
          alias ..='cd ..'
          alias theme-dark='ln -sf ~/.config/starship_themes/onedark.toml ~/.config/starship.toml'

    - name: TARS | Linking default Starship theme
      become: true
      become_user: "{{ target_user }}"
      file:
        src: "{{ target_home }}/.config/starship_themes/onedark.toml"
        dest: "{{ target_home }}/.config/starship.toml"
        state: link
        force: yes

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
