- name: TARS System Initialization
  hosts: localhost
  connection: local
  vars:
    gh_user: "jediBui"
    theme_dir: "{{ ansible_env.HOME }}/.config/starship_themes"
    themes:
      - { name: "onedark", dir: "#61afef", char: "#98c379", git: "#c678dd" }
      - { name: "frappe",  dir: "#8caaee", char: "#a6d189", git: "#ca9ee6" }
      - { name: "mocha",   dir: "#89b4fa", char: "#a6e3a1", git: "#cba6f7" }

  tasks:
    - name: TARS | Creating directory infrastructure
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ theme_dir }}"
        - "{{ ansible_env.HOME }}/.ssh"

    - name: TARS | Importing SSH keys from GitHub
      get_url:
        url: "https://github.com/{{ gh_user }}.keys"
        dest: "{{ ansible_env.HOME }}/.ssh/authorized_keys"
        mode: '0600'

    - name: TARS | Checking for Starship HUD
      stat:
        path: /usr/local/bin/starship
      register: starship_bin

    - name: TARS | Installing Starship (Universal Binary)
      shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
      when: not starship_bin.stat.exists

    - name: TARS | Generating Starship Themes
      copy:
        dest: "{{ theme_dir }}/{{ item.name }}.toml"
        content: |
          format = "$directory$git_branch$git_status$character"
          add_newline = false
          [directory]
          style = "bold {{ item.dir }}"
          [character]
          success_symbol = "[❯](bold {{ item.char }})"
          error_symbol = "[❯](bold #e06c75)"
          [git_branch]
          symbol = " "
          style = "bold {{ item.git }}"
          [git_status]
          style = "bold #e06c75"
          format = "([$all_status$ahead_behind]($style) )"
      loop: "{{ themes }}"

    - name: TARS | Linking Default Theme
      file:
        src: "{{ theme_dir }}/onedark.toml"
        dest: "{{ ansible_env.HOME }}/.config/starship.toml"
        state: link
        force: yes

    - name: TARS | Updating .bashrc (Aliases and Init)
      blockinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        marker: "# {mark} TARS THEME ALIASES"
        block: |
          eval "$(starship init bash)"
          alias theme-dark='ln -sf ~/.config/starship_themes/onedark.toml ~/.config/starship.toml && echo "TARS: One Dark active."'
          alias theme-frappe='ln -sf ~/.config/starship_themes/frappe.toml ~/.config/starship.toml && echo "TARS: Frappe active."'
          alias theme-mocha='ln -sf ~/.config/starship_themes/mocha.toml ~/.config/starship.toml && echo "TARS: Mocha active."'
          alias ll='ls -alF --color=auto'

    - name: TARS | Enabling Gnome Remote Desktop
      shell: |
        export DBUS_SESSION_BUS_ADDRESS="unix:path=/run/user/$(id -u)/bus"
        gsettings set org.gnome.desktop.remote-desktop.rdp screen-share-mode 'mirror-screen'
        gsettings set org.gnome.desktop.remote-desktop.rdp enable true
      failed_when: false
