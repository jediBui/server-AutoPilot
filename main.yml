---
- name: TARS System Provisioning
  hosts: localhost
  connection: local
  become: true
  vars:
    gh_user: "jediBui"
    # Safely determine the user who invoked sudo, or fallback to current user
    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    # Use expansion to reliably get the home directory regardless of sudo environment
    target_home: "~{{ target_user }}"
    font_dir: "{{ target_home }}/.local/share/fonts"
    themes:
      - { name: "onedark", dir: "#61afef", char: "#98c379", git: "#c678dd" }
      - { name: "frappe",  dir: "#8caaee", char: "#a6d189", git: "#ca9ee6" }
      - { name: "mocha",   dir: "#89b4fa", char: "#a6e3a1", git: "#cba6f7" }

  tasks:
    - name: TARS | Checking for GNOME presence
      command: command -v gnome-shell
      register: gnome_check
      ignore_errors: true
      changed_when: false

    - name: TARS | Detect GNOME Terminal Profile
      # Properly accessing the user's D-Bus session when running as root
      command: >
        su - {{ target_user }} -c "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u {{ target_user }})/bus gsettings get org.gnome.Terminal.ProfilesList default"
      register: gsettings_output
      when: gnome_check.rc == 0
      changed_when: false
      ignore_errors: true

    - name: TARS | Set Terminal Profile Fact
      set_fact:
        terminal_profile: "{{ gsettings_output.stdout | replace(\"'\", \"\") }}"
      when: 
        - gnome_check.rc == 0
        - gsettings_output.rc == 0

    - name: TARS | Adding Repositories and Keys
      block:
        - name: Download Google Chrome signing key
          get_url:
            url: https://dl.google.com/linux/linux_signing_key.pub
            dest: /usr/share/keyrings/google-chrome.asc
            mode: '0644'
            
        - name: Add Google Chrome repository
          apt_repository:
            repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main"
            state: present
            filename: google-chrome

    - name: TARS | Installing Base Packages
      apt:
        name: 
          - curl
          - git
          - openssh-server
          - bash-completion
          - fzf
          - ufw
          - qemu-guest-agent
          - gnome-remote-desktop
          - fontconfig
          - google-chrome-stable
        state: present
        update_cache: true

    - name: TARS | Installing Starship
      shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
      args:
        creates: /usr/local/bin/starship

    - name: TARS | Font Setup
      block:
        - name: Create font directory
          file:
            path: "{{ font_dir }}"
            state: directory
            owner: "{{ target_user }}"
            mode: '0755'
            
        - name: Download SF-Mono-Powerline fonts
          get_url:
            url: "https://github.com/Twixes/SF-Mono-Powerline/raw/master/SF-Mono-Powerline-{{ item }}.otf"
            dest: "{{ font_dir }}/SF-Mono-Powerline-{{ item }}.otf"
            owner: "{{ target_user }}"
            mode: '0644'
          loop: ["Regular", "Bold"]
          register: font_dl
          
        - name: Update font cache
          command: fc-cache -f "{{ font_dir }}"
          become_user: "{{ target_user }}"
          when: font_dl.changed

    - name: TARS | Configure GNOME Terminal Font
      become_user: "{{ target_user }}"
      # Execute dconf through the user's dbus session
      command: >
        su - {{ target_user }} -c "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u {{ target_user }})/bus dconf write /org/gnome/terminal/legacy/profiles:/:{{ terminal_profile }}/font \"'SF Mono Powerline 12'\""
      when: 
        - gnome_check.rc == 0
        - terminal_profile is defined
        - terminal_profile | length > 0

    - name: TARS | Network and Security
      block:
        - name: Configure UFW rules
          ufw:
            rule: allow
            port: "{{ item }}"
            proto: tcp
          loop: ['22', '3389']
          
        - name: Enable and start services
          systemd:
            name: "{{ item }}"
            enabled: yes
            state: started
          loop: ['ufw', 'qemu-guest-agent']
          
        - name: Add GitHub authorized key
          authorized_key:
            user: "{{ target_user }}"
            key: "https://github.com/{{ gh_user }}.keys"

    - name: TARS | Hardening SSH
      copy:
        dest: /etc/ssh/sshd_config.d/99-hardened.conf
        content: |
          PasswordAuthentication no
          PubkeyAuthentication yes
          PermitRootLogin prohibit-password
        mode: '0644'
      notify: Restart SSH

    - name: TARS | Create Starship Themes Directory
      become_user: "{{ target_user }}"
      file:
        path: "{{ target_home }}/.config/starship_themes"
        state: directory
        mode: '0755'

    - name: TARS | Starship Themes Generation
      become_user: "{{ target_user }}"
      copy:
        dest: "{{ target_home }}/.config/starship_themes/{{ item.name }}.toml"
        content: |
          format = "$directory$git_branch$git_status$character"
          add_newline = false
          [directory]
          style = "bold {{ item.dir }}"
          format = "[$path]($style) "
          [character]
          success_symbol = "[❯](bold {{ item.char }})"
          error_symbol = "[❯](bold #e06c75)"
          [git_branch]
          symbol = " "
          style = "bold {{ item.git }}"
          format = "on [$symbol$branch]($style) "
          [git_status]
          style = "bold #e06c75"
          format = "([$all_status$ahead_behind]($style) )"
        mode: '0644'
      loop: "{{ themes }}"

    - name: TARS | Bashrc and Default Theme
      become_user: "{{ target_user }}"
      block:
        - name: Configure .bashrc
          blockinfile:
            path: "{{ target_home }}/.bashrc"
            marker: "# {mark} TARS MANAGED BLOCK"
            create: yes
            mode: '0644'
            content: |
              [ -z "$PS1" ] && return
              HISTCONTROL=ignoreboth
              shopt -s histappend
              HISTSIZE=10000
              eval "$(starship init bash)"
              alias ll='ls -alF --color=auto'
              alias ..='cd ..'
              alias theme-dark='ln -sf ~/.config/starship_themes/onedark.toml ~/.config/starship.toml'
              
        - name: Link default Starship theme
          file:
            src: "{{ target_home }}/.config/starship_themes/onedark.toml"
            dest: "{{ target_home }}/.config/starship.toml"
            state: link
            force: yes

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
